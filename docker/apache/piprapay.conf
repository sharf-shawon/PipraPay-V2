<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # ── Directory settings ────────────────────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Block web access to the install wizard once the app is configured ─────
    # The entrypoint generates pp-config.php before Apache starts, so the PHP
    # redirect inside install/index.php already handles this — but defence in
    # depth at the web-server level is best practice.
    <Directory /var/www/html/install>
        Require all denied
    </Directory>

    # ── Block direct access to sensitive files ────────────────────────────────
    <FilesMatch "^(pp-config\.php|\.env)$">
        Require all denied
    </FilesMatch>

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
