; ─────────────────────────────────────────────────────────────────────────────
; PipraPay PHP configuration
; Applied on top of the official PHP defaults inside the container.
; ─────────────────────────────────────────────────────────────────────────────

; ── Memory & execution limits ─────────────────────────────────────────────────
memory_limit         = 256M
max_execution_time   = 120
max_input_time       = 120

; ── File uploads ─────────────────────────────────────────────────────────────
upload_max_filesize  = 32M
post_max_size        = 32M
max_file_uploads     = 20

; ── Error handling (display off in production, log to stderr) ────────────────
display_errors       = Off
display_startup_errors = Off
log_errors           = On
; Write errors to the container's stderr so they appear in `docker logs`
error_log            = /proc/self/fd/2

; ── Session security ──────────────────────────────────────────────────────────
session.cookie_httponly  = 1
session.use_strict_mode  = 1
; session.cookie_secure is set dynamically by the container entrypoint using the
; SESSION_COOKIE_SECURE environment variable (default 0 for local dev, 1 for
; production with HTTPS).  Do not set it here.

; ── OPcache ──────────────────────────────────────────────────────────────────
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 10000
opcache.revalidate_freq        = 60
opcache.fast_shutdown          = 1
